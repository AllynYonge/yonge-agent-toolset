<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Analytics Dashboard — SaaS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            surface: {
              DEFAULT: '#ffffff',
              2: '#f1f3f5',
              dark: '#1a1d27',
              'dark-2': '#242736',
            },
            border: {
              DEFAULT: '#e2e8f0',
              dark: '#2d3148',
            },
            primary: {
              DEFAULT: '#3b82f6',
              hover: '#2563eb',
              dark: '#60a5fa',
              'dark-hover': '#93c5fd',
            },
            success: { DEFAULT: '#10b981', dark: '#34d399' },
            warning: { DEFAULT: '#f59e0b', dark: '#fcd34d' },
            error:   { DEFAULT: '#ef4444', dark: '#f87171' },
          },
          fontSize: {
            '2xs': ['11px', '1.4'],
            xs:    ['12px', '1.5'],
            sm:    ['13px', '1.5'],
            base:  ['14px', '1.6'],
            md:    ['16px', '1.6'],
            lg:    ['18px', '1.4'],
            xl:    ['20px', '1.3'],
            '2xl': ['24px', '1.3'],
            '3xl': ['32px', '1.2'],
          },
          spacing: {
            4.5: '18px',
          },
          zIndex: {
            sidebar: '40',
            overlay: '100',
            modal:   '1000',
          },
        },
      },
    };
  </script>
  <style>
    /* ── CSS custom properties (semantic tokens) ── */
    :root {
      --bg:              #f8f9fa;
      --surface:         #ffffff;
      --surface-2:       #f1f3f5;
      --border:          #e2e8f0;
      --text-primary:    #0f172a;
      --text-secondary:  #64748b;
      --text-muted:      #94a3b8;
      --primary:         #3b82f6;
      --primary-hover:   #2563eb;
      --success:         #10b981;
      --warning:         #f59e0b;
      --error:           #ef4444;
      --sidebar-w:       240px;
      --sidebar-w-col:   64px;
      --topbar-h:        56px;
    }
    .dark {
      --bg:              #0f1117;
      --surface:         #1a1d27;
      --surface-2:       #242736;
      --border:          #2d3148;
      --text-primary:    #f1f5f9;
      --text-secondary:  #94a3b8;
      --text-muted:      #64748b;
      --primary:         #60a5fa;
      --primary-hover:   #93c5fd;
      --success:         #34d399;
      --warning:         #fcd34d;
      --error:           #f87171;
    }

    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    html { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      overflow-x: hidden;
    }

    /* ── Focus ring (§1) ── */
    :focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* ── Reduced motion (§7) ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 40;
      transition: transform 200ms ease-out, width 200ms ease-out;
      overflow: hidden;
    }
    #sidebar.collapsed { width: var(--sidebar-w-col); }
    #sidebar.mobile-hidden { transform: translateX(-100%); }

    .sidebar-logo {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo-mark {
      width: 28px; height: 28px;
      background: var(--primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 15px; font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      transition: opacity 150ms ease-out;
    }
    #sidebar.collapsed .logo-text { opacity: 0; pointer-events: none; }

    .sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 8px; }
    .nav-section-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 8px 8px 4px;
      text-transform: uppercase;
      white-space: nowrap;
      transition: opacity 150ms ease-out;
    }
    #sidebar.collapsed .nav-section-label { opacity: 0; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 0 8px;
      height: 40px;
      border-radius: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background 150ms ease-out, color 150ms ease-out;
      white-space: nowrap;
      overflow: hidden;
      touch-action: manipulation;
      border: none; background: transparent; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text-primary); }
    .nav-item.active {
      background: color-mix(in srgb, var(--primary) 12%, transparent);
      color: var(--primary);
    }
    .nav-item svg { flex-shrink: 0; }
    .nav-label { transition: opacity 150ms ease-out; }
    #sidebar.collapsed .nav-label { opacity: 0; }

    .sidebar-footer {
      padding: 12px 8px;
      border-top: 1px solid var(--border);
    }

    /* ── Overlay (mobile) ── */
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 30;
      transition: opacity 200ms ease-out;
    }
    #overlay.visible { display: block; }

    /* ── Main layout ── */
    #main {
      flex: 1;
      margin-left: var(--sidebar-w);
      display: flex;
      flex-direction: column;
      min-width: 0;
      transition: margin-left 200ms ease-out;
    }
    #main.sidebar-collapsed { margin-left: var(--sidebar-w-col); }
    #main.sidebar-hidden { margin-left: 0; }

    /* ── Topbar ── */
    #topbar {
      position: sticky; top: 0;
      height: var(--topbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 0 24px;
      z-index: 20;
      flex-shrink: 0;
    }
    .topbar-title { font-size: 16px; font-weight: 600; flex: 1; }
    .topbar-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 150ms ease-out, color 150ms ease-out;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .topbar-btn:hover { background: var(--surface-2); color: var(--text-primary); }

    .date-range-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 0 12px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background 150ms ease-out, color 150ms ease-out;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .date-range-btn:hover { background: var(--surface-2); color: var(--text-primary); }

    .btn-primary {
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: background 150ms ease-out, opacity 150ms ease-out;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Page content ── */
    #content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    /* ── KPI cards ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .kpi-label {
      font-size: 12px; font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .kpi-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px; font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .kpi-delta {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 500;
      padding: 2px 8px;
      border-radius: 100px;
    }
    .kpi-delta.up   { background: color-mix(in srgb, var(--success) 15%, transparent); color: var(--success); }
    .kpi-delta.down { background: color-mix(in srgb, var(--error)   15%, transparent); color: var(--error); }
    .kpi-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ── Sparkline (SVG inline) ── */
    .sparkline { display: block; margin-top: 12px; }

    /* ── Chart section ── */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 1023px) { .charts-row { grid-template-columns: 1fr; } }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .chart-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .chart-title { font-size: 14px; font-weight: 600; }
    .chart-legend {
      display: flex; gap: 16px;
      font-size: 12px; color: var(--text-secondary);
    }
    .legend-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .chart-area { position: relative; }
    .chart-area svg { width: 100%; display: block; }

    /* ── Donut chart ── */
    .donut-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .donut-legend { width: 100%; }
    .donut-legend-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .donut-legend-item:last-child { border-bottom: none; }
    .donut-legend-label { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
    .donut-legend-val { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-variant-numeric: tabular-nums; }

    /* ── Table ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .table-title { font-size: 14px; font-weight: 600; }
    .table-actions { display: flex; gap: 8px; }

    .search-input-wrap {
      position: relative;
      display: flex; align-items: center;
    }
    .search-input-wrap svg {
      position: absolute; left: 10px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-input {
      padding: 0 12px 0 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-primary);
      font-size: 13px;
      width: 200px;
      transition: border-color 150ms ease-out, box-shadow 150ms ease-out;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 20%, transparent); outline: none; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 20px;
      text-align: left;
      font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
      color: var(--text-muted);
      text-transform: uppercase;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    thead th:first-child { border-radius: 0; }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 100ms ease-out;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface-2); }
    tbody td {
      padding: 12px 20px;
      font-size: 13px;
      color: var(--text-primary);
      vertical-align: middle;
    }
    .td-mono {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px; font-weight: 600;
    }
    .badge-green  { background: color-mix(in srgb, var(--success) 15%, transparent); color: var(--success); }
    .badge-yellow { background: color-mix(in srgb, var(--warning) 15%, transparent); color: var(--warning); }
    .badge-red    { background: color-mix(in srgb, var(--error)   15%, transparent); color: var(--error); }
    .badge-blue   { background: color-mix(in srgb, var(--primary) 15%, transparent); color: var(--primary); }

    .avatar-stack { display: flex; }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--surface);
      margin-left: -6px;
      font-size: 11px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      flex-shrink: 0;
    }
    .avatar:first-child { margin-left: 0; }

    /* ── Toast (§8) ── */
    #toast-region {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 1000;
      pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      font-size: 13px;
      pointer-events: auto;
      transform: translateY(0); opacity: 1;
      transition: transform 200ms ease-out, opacity 200ms ease-out;
      max-width: 320px;
    }
    .toast.hiding { transform: translateY(8px); opacity: 0; }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      #sidebar { width: var(--sidebar-w); }
      #main { margin-left: 0 !important; }
      #content { padding: 16px; }
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .charts-row { grid-template-columns: 1fr; }
      .topbar-title { font-size: 15px; }
      .search-input { width: 140px; }
    }
    @media (max-width: 479px) {
      .kpi-grid { grid-template-columns: 1fr; }
      #topbar { padding: 0 16px; }
    }
  </style>
</head>
<body>
